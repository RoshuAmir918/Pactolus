services:
  postgres:
    image: postgres:16-alpine
    container_name: pactolus-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: pactolus
      POSTGRES_PASSWORD: pactolus
      POSTGRES_DB: pactolus
    ports:
      - "5432:5432"
    volumes:
      - pactolus_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pactolus -d pactolus"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pactolus_postgres_data:
